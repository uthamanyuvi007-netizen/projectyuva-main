<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam - Online Examination & Proctoring System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0d1117;
        }

        .dashboard {
            background: #0d1117;
        }

        .sidebar {
            background: #161b22;
            border-right: 1px solid #30363d;
        }

        .sidebar-header {
            background: #1f2937;
        }

        .sidebar-brand {
            color: #fff !important;
        }

        .sidebar-link {
            color: #c9d1d9 !important;
        }

        .sidebar-link:hover {
            background: #21262d !important;
            color: #58a6ff !important;
        }

        .sidebar-link.active {
            background: #6C63FF !important;
            color: #fff !important;
        }

        .sidebar-section-title {
            color: #8b949e;
        }

        .sidebar-footer {
            border-top: 1px solid #30363d;
        }

        .user-info {
            background: #21262d;
        }

        .user-name {
            color: #fff !important;
        }

        .user-role {
            color: #8b949e !important;
        }

        .user-avatar {
            background: linear-gradient(135deg, #6C63FF 0%, #8B85FF 100%);
        }

        .main-content {
            background: #0d1117;
        }

        .dashboard-header {
            background: #161b22;
            border: 1px solid #30363d;
        }

        .page-title {
            color: #fff !important;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
        }

        .card-title {
            color: #fff !important;
        }

        .card-body {
            color: #c9d1d9;
        }

        .btn-outline {
            border-color: #30363d;
            color: #c9d1d9;
        }

        .btn-outline:hover {
            background: #21262d;
            color: #fff;
        }

        .form-label {
            color: #c9d1d9 !important;
        }

        .form-control {
            background: #21262d;
            border-color: #30363d;
            color: #fff;
        }

        .form-control:focus {
            background: #21262d !important;
            border-color: #6C63FF;
            color: #fff !important;
        }

        .form-control::placeholder {
            color: #8b949e;
        }

        .select-control {
            background: #21262d;
            border-color: #30363d;
            color: #fff;
        }

        .select-control:focus {
            background: #21262d !important;
            border-color: #6C63FF;
            color: #fff !important;
            outline: none;
        }

        .select-control option {
            background: #21262d;
            color: #fff;
        }

        .question-filters {
            background: #21262d;
            border: 1px solid #30363d;
        }

        .filter-label {
            color: #c9d1d9 !important;
        }

        .question-item {
            background: #21262d;
            border: 1px solid #30363d;
            cursor: pointer;
        }

        .question-item:hover {
            background: #262c36;
        }

        .question-item-header {
            border-bottom: 1px solid #30363d;
        }

        .question-type-badge {
            color: #fff;
        }

        .question-type-badge.mcq {
            background: rgba(108, 99, 255, 0.3);
            color: #a5b4fc;
        }

        .question-type-badge.true-false {
            background: rgba(0, 217, 192, 0.3);
            color: #5eead4;
        }

        .question-type-badge.descriptive {
            background: rgba(255, 107, 107, 0.3);
            color: #fca5a5;
        }

        .empty-state {
            color: #8b949e;
        }

        .empty-title {
            color: #fff !important;
        }

        .empty-description {
            color: #8b949e;
        }
    </style>
</head>

<body class="requires-auth">
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-brand">
                    <i class="fas fa-graduation-cap"></i>
                    Zentrix
                </a>
            </div>
            <div class="sidebar-menu" id="sidebar-menu"></div>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info"></div>
            </div>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <h1 class="page-title">Create New Exam</h1>
                <div class="header-actions">
                    <a href="/" class="btn btn-outline"><i class="fas fa-home"></i> Home</a>
                    <a href="/teacher-dashboard" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Exam Details</h3>
                    </div>
                    <div class="card-body">
                        <div id="alert-container"></div>
                        <form id="exam-form">
                            <div class="form-group">
                                <label class="form-label">Exam Title</label>
                                <input type="text" class="form-control" id="exam-title"
                                    placeholder="e.g., Mathematics Final Exam" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-control" id="exam-subject"
                                    placeholder="e.g., Mathematics" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" id="exam-description" rows="3"
                                    placeholder="Enter exam description"></textarea>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label">Duration (minutes)</label>
                                    <input type="number" class="form-control" id="exam-duration" value="30" min="5"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Total Marks</label>
                                    <input type="number" class="form-control" id="exam-total-marks" value="100" min="1">
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label">Passing Marks</label>
                                    <input type="number" class="form-control" id="exam-passing-marks" value="50"
                                        min="0">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Scheduled/Start Date</label>
                                    <input type="datetime-local" class="form-control" id="exam-scheduled-date">
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr; gap: 1rem;">
                                <div class="form-group" style="margin-top: 1rem;">
                                    <label class="form-label">End Date & Time (Deadline) <span
                                            style="font-size: 0.8rem; color: #8b949e;">- Optional</span></label>
                                    <input type="datetime-local" class="form-control" id="exam-end-date">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem;">
                                <i class="fas fa-plus"></i> Create Exam
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Select Questions</h3>
                    </div>
                    <div class="card-body">
                        <div class="question-filters" style="margin-bottom: 1rem;">
                            <select class="select-control" id="filter-subject" style="flex: 1;"
                                onchange="filterQuestions()">
                                <option value="">All Subjects</option>
                            </select>
                        </div>
                        <div id="questions-list" style="max-height: 500px; overflow-y: auto;">
                            <div class="loading-spinner" style="margin: 2rem auto;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import {
            getQuestions, createExam, renderSidebar,
            showToast, checkRole
        } from "./js/main.js";

        let allQuestions = [];
        let selectedQuestions = [];

        if (!checkRole('admin', 'teacher')) { }
        renderSidebar();

        document.addEventListener('DOMContentLoaded', async () => {
            await window.loadQuestionsForExam();
        });

        window.loadQuestionsForExam = async function () {
            const result = await getQuestions();
            const container = document.getElementById('questions-list');
            const subjectFilter = document.getElementById('filter-subject');

            if (result.success && result.data.length > 0) {
                allQuestions = result.data;
                const subjects = [...new Set(result.data.map(q => q.subject))];
                if (subjectFilter) {
                    subjects.forEach(subject => {
                        const option = document.createElement('option');
                        option.value = subject;
                        option.textContent = subject;
                        subjectFilter.appendChild(option);
                    });
                }
                window.renderQuestionsList(allQuestions);
            } else {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><h3 class="empty-title">No Questions Available</h3><p class="empty-description">Add questions to the question bank first.</p><a href="/question-bank" class="btn btn-primary">Add Questions</a></div>`;
            }
        }

        window.filterQuestions = function () {
            const subject = document.getElementById('filter-subject').value;
            const filtered = subject ? allQuestions.filter(q => q.subject === subject) : allQuestions;
            window.renderQuestionsList(filtered);
        }

        window.renderQuestionsList = function (questions) {
            const container = document.getElementById('questions-list');
            if (questions.length === 0) { container.innerHTML = '<p style="text-align: center; color: #8b949e;">No questions found.</p>'; return; }

            let html = '';
            questions.forEach(q => {
                const isSelected = selectedQuestions.includes(q._id);
                html += `
                    <div class="question-item" style="${isSelected ? 'border-color: #6C63FF; background: rgba(108, 99, 255, 0.1);' : ''}" onclick="window.toggleQuestion('${q._id}')">
                        <div class="question-item-header">
                            <div>
                                <span class="question-type-badge ${q.questionType === 'mcq' ? 'mcq' : q.questionType === 'true-false' ? 'true-false' : 'descriptive'}">${q.questionType}</span>
                                <span style="margin-left: 0.5rem; color: #8b949e;">${q.subject}</span>
                            </div>
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); window.toggleQuestion('${q._id}')">
                        </div>
                        <p style="font-weight: 500; margin: 0.5rem 0; color: #fff;">${q.questionText.substring(0, 100)}...</p>
                        <p style="font-size: 0.875rem; color: #8b949e; margin: 0;">Marks: ${q.marks}</p>
                    </div>`;
            });
            container.innerHTML = html;
        }

        window.toggleQuestion = function (questionId) {
            const index = selectedQuestions.indexOf(questionId);
            if (index > -1) { selectedQuestions.splice(index, 1); }
            else { selectedQuestions.push(questionId); }
            window.filterQuestions();
        }

        document.getElementById('exam-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (selectedQuestions.length === 0) {
                showToast('Please select at least one question from the Question Bank before creating the exam.', 'error');
                return;
            }

            const exam = {
                title: document.getElementById('exam-title').value,
                subject: document.getElementById('exam-subject').value,
                description: document.getElementById('exam-description').value,
                duration: parseInt(document.getElementById('exam-duration').value),
                total_marks: parseInt(document.getElementById('exam-total-marks').value),
                passing_marks: parseInt(document.getElementById('exam-passing-marks').value),
                scheduled_date: document.getElementById('exam-scheduled-date').value,
                end_date: document.getElementById('exam-end-date').value,
                question_ids: selectedQuestions
            };
            const result = await createExam(exam);
            if (result.success) {
                showToast('Exam created successfully!', 'success');
                setTimeout(() => { window.location.href = '/teacher-dashboard'; }, 1500);
            } else { showToast(result.message, 'error'); }
        });
    </script>
</body>

</html>
