<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Examination & Proctoring System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0d1117;
        }

        .auth-page {
            background: linear-gradient(135deg, #0d1117 0%, #1a1f35 50%, #0d1117 100%);
        }

        .auth-container {
            background: #161b22;
            border: 1px solid #30363d;
        }

        .auth-header {
            background: linear-gradient(135deg, #6C63FF 0%, #8B85FF 100%);
        }

        .auth-title {
            color: #fff !important;
        }

        .auth-subtitle {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .form-label {
            color: #c9d1d9;
        }

        .form-control {
            background: #0d1117;
            border-color: #30363d;
            color: #c9d1d9;
        }

        .form-control:focus {
            background: #0d1117;
            border-color: #6C63FF;
            color: #fff;
        }

        .form-control::placeholder {
            color: #6c757d;
        }

        .password-toggle {
            color: #8b949e;
        }

        .auth-footer {
            background: #0d1117;
        }

        .auth-footer p {
            color: #8b949e !important;
        }

        .auth-footer a {
            color: #6C63FF !important;
        }

        .alert-error {
            background: rgba(255, 61, 0, 0.1);
            border-color: #f85149;
            color: #f85149;
        }
    </style>
</head>

<body>
    <a href="/" class="btn"
        style="position: fixed; top: 20px; left: 20px; background: #161b22; color: #fff; border: 1px solid #30363d; z-index: 1000; padding: 10px 20px; border-radius: 8px;"><i
            class="fas fa-home"></i> Back to Home</a>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-graduation-cap"></i></div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to your account</p>
            </div>
            <div class="auth-body">
                <div id="alert-container"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" class="form-control" id="password" placeholder="Enter your password"
                                required>
                            <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;"><i
                            class="fas fa-sign-in-alt"></i> Login</button>
                </form>

                <div style="text-align: center; margin-top: 1.5rem;">
                    <p style="color: #8b949e;">Don't have an account? <a href="/register"
                            style="color: #6C63FF; font-weight: 600;">Register here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
    <script type="module">
        import { login, showToast, redirectByRole } from "./js/main.js";

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = '';

            const result = await login(email, password);

            if (result.success) {
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => { redirectByRole(); }, 1000);
            } else { alertContainer.innerHTML = `<div class="alert alert-error">${result.message}</div>`; }
        });

        if (localStorage.getItem('token')) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                switch (user.role) { case 'admin': window.location.href = '/admin-dashboard'; break; case 'teacher': window.location.href = '/teacher-dashboard'; break; case 'student': window.location.href = '/student-dashboard'; break; }
            }
        }
    </script>
</body>

</html>
