<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Examination & Proctoring System</title>
    <!-- <link rel="stylesheet" href="/css/style.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0d1117;
        }

        .auth-page {
            background: linear-gradient(135deg, #0d1117 0%, #1a1f35 50%, #0d1117 100%);
        }

        .auth-container {
            background: #161b22;
            border: 1px solid #30363d;
        }

        .auth-header {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
        }

        .auth-title {
            color: #fff !important;
        }

        .auth-subtitle {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .form-label {
            color: #c9d1d9;
        }

        .form-control {
            background: #0d1117;
            border-color: #30363d;
            color: #c9d1d9;
        }

        .form-control:focus {
            background: #0d1117;
            border-color: #FF6B6B;
            color: #fff;
        }

        .form-control::placeholder {
            color: #6c757d;
        }

        .password-toggle {
            color: #8b949e;
        }

        .role-option label {
            background: #0d1117;
            border-color: #30363d;
            color: #c9d1d9;
        }

        .role-option input:checked+label {
            border-color: #FF6B6B;
            background: rgba(255, 107, 107, 0.1);
        }

        .role-option label:hover {
            border-color: #FF6B6B;
        }

        small {
            color: #8b949e !important;
        }

        .alert-warning {
            background: rgba(255, 179, 0, 0.1);
            border-color: #d29922;
            color: #d29922;
        }

        .alert-success {
            background: rgba(0, 200, 83, 0.1);
            border-color: #3fb950;
            color: #3fb950;
        }

        .alert-error {
            background: rgba(255, 61, 0, 0.1);
            border-color: #f85149;
            color: #f85149;
        }
    </style>
</head>

<body>
    <a href="/" class="btn"
        style="position: fixed; top: 20px; left: 20px; background: #161b22; color: #fff; border: 1px solid #30363d; z-index: 1000; padding: 10px 20px; border-radius: 8px;"><i
            class="fas fa-home"></i> Back to Home</a>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join our examination platform</p>
            </div>
            <div class="auth-body">
                <div id="alert-container"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" class="form-control" id="password" placeholder="Create a password"
                                required>
                            <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">I am a</label>
                        <div class="role-selector">
                            <div class="role-option">
                                <input type="radio" name="role" id="role-student" value="student" checked>
                                <label for="role-student">
                                    <span class="role-icon">👨‍🎓</span>
                                    <span class="role-name">Student</span>
                                </label>
                            </div>
                            <div class="role-option">
                                <input type="radio" name="role" id="role-teacher" value="teacher">
                                <label for="role-teacher">
                                    <span class="role-icon">👨‍🏫</span>
                                    <span class="role-name">Teacher</span>
                                </label>
                            </div>
                            <div class="role-option">
                                <input type="radio" name="role" id="role-admin" value="admin">
                                <label for="role-admin">
                                    <span class="role-icon">👨‍💼</span>
                                    <span class="role-name">Admin</span>
                                </label>
                            </div>
                        </div>
                        <small><i class="fas fa-info-circle"></i> Teachers require admin approval after
                            registration</small>
                    </div>

                    <button type="submit" class="btn btn-secondary btn-lg" style="width: 100%;"><i
                            class="fas fa-user-plus"></i> Register</button>
                </form>

                <div style="text-align: center; margin-top: 1.5rem;">
                    <p style="color: #8b949e;">Already have an account? <a href="/login"
                            style="color: #FF6B6B; font-weight: 600;">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
    <script type="module">
        import { register, showToast } from "./js/main.js";

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = '';

            const result = await register(name, email, password, role);

            if (result.success) {
                if (role === 'teacher') {
                    alertContainer.innerHTML = `<div class="alert alert-warning">${result.message}. Please wait for admin approval.</div>`;
                    showToast(result.message || 'Registration pending approval', 'warning');
                    setTimeout(() => { window.location.href = '/login'; }, 3000);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                    showToast(result.message || 'Registration successful', 'success');
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                }
            } else { alertContainer.innerHTML = `<div class="alert alert-error">${result.message}</div>`; }
        });

        if (localStorage.getItem('token')) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                switch (user.role) { case 'admin': window.location.href = '/admin-dashboard'; break; case 'teacher': window.location.href = '/teacher-dashboard'; break; case 'student': window.location.href = '/student-dashboard'; break; }
            }
        }
    </script>
</body>

</html>
